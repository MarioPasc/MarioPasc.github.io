###############################################################################
# SITE META
###############################################################################
title:  "Mario • Research, Portfolio & Diary"
author: "Mario Pascual González"
description: "Biomedical-imaging researcher: projects, code & musings."
url:  "https://mariopasc.github.io/"
baseurl: ""
email: "mpascualg02@gmail.com"
date_format: "%b %-d, %Y"

###############################################################################
# FEATURES
###############################################################################
enable_mathjax: true

###############################################################################
# SOCIAL
###############################################################################
github_username:   MarioPasc
twitter_username:  ratpenant
linkedin_username: mario-pascual-gonzalez

###############################################################################
# COLLECTIONS
###############################################################################
collections_dir: content

collections:
  blog:
    output: true
    permalink: /blog/:title/
  research:
    output: true
    permalink: /research/:path/

###############################################################################
# DEFAULT FRONT-MATTER
###############################################################################
defaults:
  - scope:
      path: "_blog"
      type: blog
    values:
      layout: post
  - scope:
      path: "_research"
      type: research
    values:
      layout: default

###############################################################################
# BUILD
###############################################################################
markdown: kramdown
permalink: pretty
paginate: 10
paginate_path: "/blog/:num/"
plugins:
  - jekyll-paginate
  - jekyll-sitemap
sass:
  sass_dir: _sass
  style: compressed
exclude: [vendor, node_modules, CLAUDE.md, .claude]
kramdown:
  input: GFM
