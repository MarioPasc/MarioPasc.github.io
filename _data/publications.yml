  comments: "Preprint, sent to the IEEE ICIP 2026 conference. The code provides a PyPI package that allows you to easily train your own diffusion model with the SLIM-Diff architecture, which is especially designed for data-scarce image-to-image translation tasks. The paper includes a detailed description of the architecture and the training procedure, as well as an extensive ablation study on the different components of the model."

- id: pascual2025hyperparameter
  title: "Hyperparameter optimization of YOLO models for invasive coronary angiography lesion detection and assessment"
  authors: "M. Pascual-González, A. Jiménez-Partinen, E. J. Palomo, E. López-Rubio, A. Ortega-Gómez"
  venue: "Computers in Biology and Medicine"
  year: 2025
  doi: "10.1016/j.compbiomed.2025.110697"
  arxiv: ""
  paper: ""
  github: "https://github.com/MarioPasc/Coronary_Angiography_Detection"
  zenodo: ""
  pypi: ""
  featured: true
  bibtex: |
    @article{pascual2025hyperparameter,
      title={Hyperparameter optimization of YOLO models for invasive coronary angiography lesion detection and assessment},
      author={Pascual-Gonzalez, Mario and Jimenez-Partinen, Ariadna and Palomo, Esteban J and Lopez-Rubio, Ezequiel and Ortega-Gomez, Almudena},
      journal={Computers in Biology and Medicine},
      volume={196},
      pages={110697},
      year={2025},
      publisher={Elsevier}
    }
  comments: "My first scientific publication. Leaving the statistical analysis aside, the code provides an easy tool that is able to integrate the hyperparameter optimization of any YOLO variant using the <a href=\"https://optuna.readthedocs.io/en/stable/\"><em>Optuna</em></a> framework. You only have to define your trainer at <code>optimization/engine/trainers</code>. The script <code>optimization/engine/hpo.py</code> will catch your trainer class and optimize it with the configuration you defined (see example at <code>optimization/cfg/files/picasso/yaml</code>), where you must write your trainer class in the <code>model_source</code> entry."

