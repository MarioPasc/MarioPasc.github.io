      address={Málaga, España},
      isbn={978-1-300-31039-6},
      organization={Universidad de Málaga}
    }
  comments: "This is a conference paper that I presented at the III Congreso Nacional de Estudiantes de Radiología y Medicina Física, held in Málaga in 2025. The paper describes a method for blind noise estimation in MRI images using Gaussian random fields, which can be used to optimize the preprocessing of MRI images for subsequent analysis. The code is not publicly available, but the paper provides a detailed description of the method and the results obtained on a dataset of MRI images, this was a \"fun\" experiment, where I learned a lot about statistical properties of MRI noise and its physics."
